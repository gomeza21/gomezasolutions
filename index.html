<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GOMEZA SOLUTIONS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#0A1C1A;color:#FFF;}
header{background:#0A1C1A;padding:60px 20px;text-align:center;}
header h1{font-size:3rem;color:#D4AF37;}
.btn{display:inline-block;margin-top:20px;padding:12px 25px;background:#D4AF37;color:#0A1C1A;text-decoration:none;border-radius:8px;font-weight:bold;}
section{padding:50px 20px;max-width:1100px;margin:auto;}
h2{text-align:center;color:#D4AF37;}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;}
.card{background:#1E2F2B;padding:25px;border-radius:10px;}
.card h3{color:#D4AF37;}
.contacto{text-align:center;}
footer{text-align:center;color:#888;}
</style>
</head>
<body>
<header>
<img src="logo.png" width="180">
<h1>GOMEZA SOLUTIONS</h1>
<p>Automatización y soluciones digitales para ingeniería</p>
<a class="btn" href="https://wa.me/51917810116">Solicitar Información</a>
</header>

<section>
<h2>Servicios</h2>
<div class="cards" id="productos">Cargando productos...</div>
</section>

<section class="contacto">
<h2>Contacto</h2>
<p>WhatsApp: 917810116</p>
<a class="btn" href="https://wa.me/51917810116">Escribir por WhatsApp</a>
</section>

<footer>© 2025 GOMEZA SOLUTIONS</footer>

<script>
const SHEET_ID = "1XoqHM6NLzTp9Ej_ND2eUg9ZBuMZuYAuCoE4-wIXGkV4";
const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

fetch(URL)
  .then(res => res.text())
  .then(text => {
    const json = text.substring(47).slice(0, -2);
    const data = JSON.parse(json);
    const rows = data.table.rows;
    let html = "";
    for (let i = 1; i < rows.length; i++) {
      const producto = rows[i].c[0]?.v || "";
      const descripcion = rows[i].c[1]?.v || "";
      const precio = rows[i].c[2]?.v || "";
      const oferta = rows[i].c[3]?.v || "";
      html += `<div class="card">
        <h3>${producto}</h3>
        <p>${descripcion}</p>
        <p style="color:#D4AF37;font-size:1.4rem"><strong>${precio}</strong></p>
        ${oferta ? `<p style="color:#FF8888">🔥 ${oferta}</p>` : ""}
      </div>`;
    }
    document.getElementById("productos").innerHTML = html;
  })
  .catch(() => document.getElementById("productos").innerHTML = '<div class="card">Error al cargar. Recarga la página.</div>');
</script>
</body>
</html>
